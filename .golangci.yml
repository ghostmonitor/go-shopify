version: "2"

run:
    timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck # also includes gosimple and unused (replaces deadcode, structcheck, varcheck)
    - bodyclose
    - dogsled
    - dupl
    - errorlint
    - exhaustive
    - forbidigo
    - funlen
    - gochecknoinits
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - godot
    - gosec
    - lll
    - misspell
    - mnd
    - nestif
    - nlreturn
    - noctx
    - prealloc
    - predeclared
    - thelper
    - unconvert
    - unparam
    - wrapcheck
    - wsl_v5
  settings:
    forbidigo:
      forbid:
        - pattern: ^fmt\.Errorf$
          msg: consider errors.Errorf in github.com/pkg/errors
        - pattern: ^fmt\.Print.*
          msg: use a logger instead
    gocritic:
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
      disabled-checks:
        - dupImport # https://github.com/go-critic/go-critic/issues/845
        - whyNoLint
        - paramTypeCombine
    funlen:
      lines: 90
      statements: 60
  exclusions:
    rules:
      # Exclude some linters from running on tests files.
      - path: _test\.go
        linters:
          - gocyclo
          - errcheck
          - dupl
          - gosec
          - lll
          - gocritic
          - mnd
          - funlen
          - wrapcheck
      - path: test/
        linters:
          - gocyclo
          - errcheck
          - dupl
          - gosec
          - lll
          - gocritic
          - mnd
          - funlen
          - wrapcheck
    # 0 to disable it. This way it will show all the errors at once and don't have to wait for another build
    max-issues-per-linter: 0
    # 0 to disable it. This way it will show all the errors at once and don't have to wait for another build
    max-same-issues: 0

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    goimports:
      local-prefixes: github.com/ghostmonitor/go-shopify
